[package]
edition = "2021"
rust-version = "1.84"
name = "pinocchio"
version = "0.10.2"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Create Solana programs with no external dependencies attached"
readme = "README.md"
license = "Apache-2.0"
repository = "https://github.com/anza-xyz/pinocchio"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg=docsrs"]
targets = ["x86_64-unknown-linux-gnu"]

[lib]
name = "pinocchio"
