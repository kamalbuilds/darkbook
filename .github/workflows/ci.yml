name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  SOLANA_VERSION: "2.0.20"
  ANCHOR_VERSION: "0.32.1"
  RUST_VERSION: "1.81.0"
  BUN_VERSION: "1.1.38"

jobs:
  # ─── Rust / Anchor program ─────────────────────────────────────────────────
  program-build:
    name: Build Anchor program
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Solana CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/solana
            ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor avm --force && avm install ${{ env.ANCHOR_VERSION }} && avm use ${{ env.ANCHOR_VERSION }}

      - name: Anchor build
        run: anchor build

      - name: Upload IDL artifact
        uses: actions/upload-artifact@v4
        with:
          name: idl
          path: |
            target/idl/darkbook.json
            target/types/darkbook.ts
          if-no-files-found: error

  program-test:
    name: Test Anchor program
    runs-on: ubuntu-latest
    needs: program-build
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Solana CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/solana
            ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor avm --force && avm install ${{ env.ANCHOR_VERSION }} && avm use ${{ env.ANCHOR_VERSION }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Anchor test (skip deploy)
        run: anchor test --skip-deploy
        continue-on-error: true # tests may need devnet creds

  # ─── TypeScript SDK ────────────────────────────────────────────────────────
  sdk-typecheck:
    name: SDK build + typecheck
    runs-on: ubuntu-latest
    needs: program-build
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            sdk/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('bun.lock') }}
      - name: Download IDL artifact
        uses: actions/download-artifact@v4
        with:
          name: idl
          path: target/
      - run: |
          mkdir -p sdk/src/idl
          cp target/idl/darkbook.json sdk/src/idl/darkbook.json
      - run: bun install --frozen-lockfile
      - run: bun run -F @darkbook/sdk build
      - run: bun run -F @darkbook/sdk typecheck

  # ─── Dashboard (Next.js) ───────────────────────────────────────────────────
  dashboard-build:
    name: Dashboard build
    runs-on: ubuntu-latest
    needs: sdk-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache node_modules + .next
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            dashboard/node_modules
            dashboard/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('bun.lock') }}
      - name: Download IDL artifact
        uses: actions/download-artifact@v4
        with:
          name: idl
          path: target/
      - run: |
          mkdir -p sdk/src/idl
          cp target/idl/darkbook.json sdk/src/idl/darkbook.json
      - run: bun install --frozen-lockfile
      - run: bun run -F @darkbook/sdk build
      - run: bun run -F dashboard build
        env:
          NEXT_PUBLIC_PROGRAM_ID: 9i4Gpnt8GgrwxqwXdEyjFBsfNChis8z9jmyAbMpFVLcS
          NEXT_PUBLIC_RPC: https://api.devnet.solana.com
          NEXT_PUBLIC_ER_RPC: https://devnet-us.magicblock.app/
          NEXT_PUBLIC_ER_WS: wss://devnet-us.magicblock.app/

  # ─── Services typecheck (matrix) ────────────────────────────────────────────
  services-typecheck:
    name: Services typecheck
    runs-on: ubuntu-latest
    needs: sdk-typecheck
    strategy:
      fail-fast: false
      matrix:
        service: [settler, er-broadcaster, funding-cron, liquidation-watcher]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            services/${{ matrix.service }}/node_modules
            sdk/node_modules
          key: ${{ runner.os }}-svc-${{ matrix.service }}-${{ hashFiles('bun.lock') }}
      - name: Download IDL artifact
        uses: actions/download-artifact@v4
        with:
          name: idl
          path: target/
      - run: |
          mkdir -p sdk/src/idl
          cp target/idl/darkbook.json sdk/src/idl/darkbook.json
      - run: bun install --frozen-lockfile
      - run: bun run -F @darkbook/sdk build
      - run: bun run -F "@darkbook/${{ matrix.service }}" typecheck
