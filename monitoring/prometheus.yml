global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "darkbook"
    env: "devnet"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Settler service (port 8081)
  - job_name: "darkbook-settler"
    static_configs:
      - targets: ["host.docker.internal:8081"]
    metrics_path: "/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s
    relabel_configs:
      - target_label: service
        replacement: settler

  # ER Broadcaster service (port 8082)
  - job_name: "darkbook-er-broadcaster"
    static_configs:
      - targets: ["host.docker.internal:8082"]
    metrics_path: "/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s
    relabel_configs:
      - target_label: service
        replacement: er-broadcaster

  # Liquidation Watcher service (port 8083)
  - job_name: "darkbook-liquidation-watcher"
    static_configs:
      - targets: ["host.docker.internal:8083"]
    metrics_path: "/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s
    relabel_configs:
      - target_label: service
        replacement: liquidation-watcher

  # Funding Cron service (port 8084)
  - job_name: "darkbook-funding-cron"
    static_configs:
      - targets: ["host.docker.internal:8084"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 5s
    relabel_configs:
      - target_label: service
        replacement: funding-cron
